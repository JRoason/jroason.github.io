<!DOCTYPE html> <html> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <style>body{margin:0;background-color:black;display:flex;justify-content:center;align-items:center;height:100vh}#countdown{color:red;font-size:clamp(2rem,8vw,20rem);font-family:Arial,sans-serif;text-align:center;white-space:nowrap}</style> </head> <body> <p id="countdown"></p> <script>function updateCountdown(){var e=(new Date).getTime(),t=countDownDate-e,n=Math.floor(t/864e5),o=Math.floor(t%864e5/36e5),a=Math.floor(t%36e5/6e4),u=Math.floor(t%6e4/1e3);t<0&&(clearInterval(x),document.getElementById("countdown").innerHTML="THE GAME"),document.getElementById("countdown").innerHTML=n+"d "+o+"h "+a+"m "+u+"s"}var countDownDate=new Date("Jun 11, 2026 14:30:00").getTime();updateCountdown();var x=setInterval(updateCountdown,1e3);</script> </body> </html>
